<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>XiandaoDemo Selection Export</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #1f2430;
        --muted: #697180;
        --border: #d7dbe3;
        --accent: #2563eb;
        --accent-pressed: #1d4ed8;
        --surface: #f6f7fb;
        --danger: #b42318;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1b1f29;
          --fg: #f5f7fb;
          --muted: #b8bfcc;
          --border: #30384a;
          --accent: #4c8dff;
          --accent-pressed: #3c78df;
          --surface: #131722;
          --danger: #ff8c82;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 16px;
        font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--fg);
      }

      .page {
        display: grid;
        gap: 12px;
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        padding: 12px;
      }

      .title {
        margin: 0 0 4px;
        font-size: 16px;
        font-weight: 600;
      }

      .muted {
        color: var(--muted);
      }

      .status {
        min-height: 20px;
        color: var(--muted);
      }

      .status.error {
        color: var(--danger);
      }

      .meta {
        display: grid;
        grid-template-columns: 92px 1fr;
        gap: 6px 10px;
        margin-top: 8px;
      }

      .meta-key {
        color: var(--muted);
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        font: inherit;
        cursor: pointer;
      }

      .primary {
        background: var(--accent);
        color: white;
      }

      .primary:active {
        background: var(--accent-pressed);
      }

      .secondary {
        background: transparent;
        color: var(--fg);
        border: 1px solid var(--border);
      }

      textarea {
        width: 100%;
        min-height: 360px;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--bg);
        color: var(--fg);
        padding: 12px;
        font: 12px/1.45 "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
      }

      ul {
        margin: 8px 0 0;
        padding-left: 18px;
      }

      li {
        margin: 3px 0;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="panel">
        <h1 class="title">Figma 选中节点导出</h1>
        <div id="status" class="status">等待 Figma 选择变化…</div>
        <div class="meta">
          <div class="meta-key">Page</div>
          <div id="pageName">-</div>
          <div class="meta-key">Selection</div>
          <div id="selectionName">-</div>
          <div class="meta-key">Node ID</div>
          <div id="selectionId">-</div>
          <div class="meta-key">Assets</div>
          <div id="assetCount">0</div>
        </div>
      </div>

      <div class="panel">
        <div class="actions">
          <button id="refresh" class="secondary">刷新</button>
          <button id="copy" class="primary">复制 JSON</button>
          <button id="download" class="secondary">下载 JSON</button>
          <button id="close" class="secondary">关闭插件</button>
        </div>
      </div>

      <div class="panel">
        <div class="title" style="font-size: 14px; margin-bottom: 8px;">导出当前选中图标</div>
        <div class="muted" style="margin-bottom: 10px;">选中单个图标或节点后，按功能名导出。建议命名如 `login_icon`、`home_tab`。</div>
        <div style="display: grid; gap: 10px;">
          <input id="assetName" type="text" placeholder="asset name" style="width: 100%; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--fg); padding: 10px 12px; font: inherit;" />
          <div class="actions">
            <button id="downloadPng" class="primary">下载 PNG</button>
            <button id="downloadSvg" class="secondary">下载 SVG</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="muted">图片资源会在导出 JSON 的 `assets` 字段里列出建议的 `assetName`。插件当前不直接写本地文件系统。</div>
        <ul id="assets"></ul>
      </div>

      <textarea id="exportOutput" spellcheck="false"></textarea>
    </div>

    <script>
      const status = document.getElementById("status");
      const pageName = document.getElementById("pageName");
      const selectionName = document.getElementById("selectionName");
      const selectionId = document.getElementById("selectionId");
      const assetCount = document.getElementById("assetCount");
      const assets = document.getElementById("assets");
      const output = document.getElementById("exportOutput");
      const assetNameInput = document.getElementById("assetName");
      const copyButton = document.getElementById("copy");
      const downloadButton = document.getElementById("download");
      const downloadPngButton = document.getElementById("downloadPng");
      const downloadSvgButton = document.getElementById("downloadSvg");
      const refreshButton = document.getElementById("refresh");
      const closeButton = document.getElementById("close");

      let currentPayload = null;

      function renderAssets(items) {
        assets.innerHTML = "";

        if (!items || items.length === 0) {
          const li = document.createElement("li");
          li.textContent = "当前选中节点没有图片填充资源。";
          assets.appendChild(li);
          return;
        }

        items.forEach((item) => {
          const li = document.createElement("li");
          li.textContent = `${item.assetName} <- ${item.nodeName} (${item.nodeId})`;
          assets.appendChild(li);
        });
      }

      function updateView(payload) {
        currentPayload = payload;

        if (payload.error) {
          status.textContent = payload.error;
          status.classList.add("error");
          pageName.textContent = "-";
          selectionName.textContent = "-";
          selectionId.textContent = "-";
          assetCount.textContent = "0";
          renderAssets([]);
          output.value = JSON.stringify(payload, null, 2);
          return;
        }

        status.textContent = "导出数据已同步，可复制或下载。";
        status.classList.remove("error");
        pageName.textContent = payload.source.pageName;
        selectionName.textContent = payload.source.selectionName;
        selectionId.textContent = payload.source.selectionId;
        assetCount.textContent = String(payload.assets.length);
        if (!assetNameInput.dataset.dirty) {
          assetNameInput.value = String(payload.source.selectionName || "figma_asset")
            .trim()
            .replace(/[^a-z0-9]+/gi, "_")
            .replace(/^_+|_+$/g, "")
            .toLowerCase();
        }
        renderAssets(payload.assets);
        output.value = JSON.stringify(payload, null, 2);
      }

      async function copyJson() {
        if (!currentPayload) {
          return;
        }

        try {
          await navigator.clipboard.writeText(output.value);
          status.textContent = "JSON 已复制到剪贴板。";
          status.classList.remove("error");
        } catch (error) {
          status.textContent = `复制失败: ${error}`;
          status.classList.add("error");
        }
      }

      function downloadJson() {
        if (!currentPayload || currentPayload.error) {
          return;
        }

        const json = output.value;
        const selectionNameSafe = String(currentPayload.source.selectionName || "figma_export")
          .trim()
          .replace(/[^a-z0-9]+/gi, "_")
          .replace(/^_+|_+$/g, "")
          .toLowerCase();
        const blob = new Blob([json], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = `${selectionNameSafe || "figma_export"}.json`;
        anchor.click();
        URL.revokeObjectURL(url);
      }

      function downloadBinaryAsset(payload) {
        const bytes = new Uint8Array(payload.bytes || []);
        const blob = new Blob([bytes], { type: payload.mimeType });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = `${payload.assetName}.${payload.extension}`;
        anchor.click();
        URL.revokeObjectURL(url);
        status.textContent = `已下载 ${payload.assetName}.${payload.extension}`;
        status.classList.remove("error");
      }

      function requestAssetDownload(format) {
        const assetName = (assetNameInput.value || "").trim() || "figma_asset";
        parent.postMessage(
          {
            pluginMessage: {
              type: "export-asset",
              format,
              assetName,
            },
          },
          "*"
        );
      }

      copyButton.addEventListener("click", copyJson);
      downloadButton.addEventListener("click", downloadJson);
      downloadPngButton.addEventListener("click", () => requestAssetDownload("PNG"));
      downloadSvgButton.addEventListener("click", () => requestAssetDownload("SVG"));
      refreshButton.addEventListener("click", () => {
        parent.postMessage({ pluginMessage: { type: "refresh" } }, "*");
      });
      closeButton.addEventListener("click", () => {
        parent.postMessage({ pluginMessage: { type: "close" } }, "*");
      });
      assetNameInput.addEventListener("input", () => {
        assetNameInput.dataset.dirty = "true";
      });

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) {
          return;
        }

        if (message.type === "export-data") {
          updateView(message.payload);
          return;
        }

        if (message.type === "export-asset-result") {
          downloadBinaryAsset(message.payload);
        }
      };
    </script>
  </body>
</html>
